<!DOCTYPE html><html lang="en" styles=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Project X Login - Monochrome</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="monochrome-enhancements">
    /* High contrast focus states and custom borders */
    .role-card {
      transition: all 0.2s ease-in-out;
      border: 1px solid #e5e7eb;
    }
    .role-card.active {
      border: 2px solid #000000;
      background-color: #f9fafb;
    }
    .role-card.active .check-icon {
      display: flex;
    }
    .check-icon {
      display: none;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
    }
    /* Hero background overlay for monochrome look */
    .hero-overlay {
      background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1000&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
    }
  </style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" data-snapdom="injected-import"></head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6 md:p-12">
<!-- BEGIN: Main Login Container - Desktop Side-by-Side -->
<main class="w-full max-w-5xl bg-white shadow-2xl overflow-hidden rounded-2xl border border-gray-200 flex flex-col md:flex-row min-h-[600px]" data-purpose="login-container">
<!-- BEGIN: Hero Section (Left on Desktop) -->
<section class="hero-overlay w-full md:w-1/2 p-12 text-white flex flex-col justify-center relative" data-purpose="branding-hero">
<!-- Logo placeholder -->
<div class="mb-10">
<div class="flex items-center space-x-3">
<span class="text-3xl font-extrabold tracking-tighter">PROJECT X</span>
<svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM3.88 9L12 4.57 20.12 9 12 13.43 3.88 9z"></path></svg>
</div>
<p class="text-xs uppercase tracking-widest opacity-80 mt-2">Next Gen Solutions</p>
</div>
<div class="max-w-md">
<h1 class="text-5xl font-extrabold mb-6 leading-tight">Scale Without <br> Limits</h1>
<p class="text-lg text-gray-200 leading-relaxed">
        Simple, transparent pay-as-you-go software.
      </p>
</div>
</section>
<!-- END: Hero Section -->
<!-- BEGIN: Form Section (Right on Desktop) -->
<section class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-center bg-white" data-purpose="login-form-area">
<div class="mb-10">
<h2 class="text-3xl font-bold text-black">Welcome </h2>
<div class="h-1.5 w-16 bg-black mt-2"></div>
</div>
<!-- BEGIN: Role Selection -->

<!-- END: Role Selection -->
<!-- BEGIN: Credentials Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block text-[11px] font-extrabold text-gray-500 uppercase mb-2.5 tracking-widest">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<input class="block w-full pl-12 pr-4 py-4 border border-gray-300 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-black transition-all" id="email" name="email" placeholder="john@projectx.com" type="email">
</div><p class="text-xs text-gray-500 mt-2">We'll send the unlock code to this email</p>
</div>
<!-- Device address Input -->
<div>
<label class="block text-[11px] font-extrabold text-gray-500 uppercase mb-2.5 tracking-widest">Device address (0x...)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<input class="block w-full pl-12 pr-4 py-4 border border-gray-300 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-black transition-all" id="password" name="password" placeholder="0x" type="password">
</div>
</div>
<!-- Payment amount display section -->
<div id="payment-info-section" class="hidden">
<div class="border border-gray-200 rounded-xl p-6 bg-gray-50 mb-6">
<div class="flex justify-between items-center">
<span class="text-sm font-semibold text-gray-600">Payment Amount</span>
<span class="text-3xl font-bold text-black" id="payment-amount-display">₦0.00</span>
</div>
<p class="text-xs text-gray-500 mt-3">Monthly subscription fee</p>
</div>

<!-- Payment method selection -->
<div class="mb-6">
<label class="block text-[11px] font-extrabold text-gray-500 uppercase mb-3 tracking-widest">Payment Method</label>
<div id="payment-methods" class="space-y-3">
<label class="flex items-center border border-gray-300 rounded-xl p-4 cursor-pointer hover:bg-gray-50 transition-all">
<input type="radio" name="paymentMethod" value="paystack" checked class="w-4 h-4">
<span class="ml-3 text-sm font-semibold text-gray-700">Paystack (Card, Bank Transfer)</span>
</label>
</div>
</div>
</div>

<!-- Address status -->
<p id="address-status" class="text-xs text-gray-500 mt-3 transition-opacity duration-300">Enter a valid device address</p>
<p id="contract-status" class="text-xs text-red-500 mt-2 min-h-[1.25rem] opacity-80"></p>
<div id="proceed-spacing" class="h-0 transition-[height,opacity] duration-300 overflow-hidden opacity-0">
  <div class="pt-6"></div>
</div>

<!-- Submit Button -->
<button class="w-full bg-black text-white text-sm font-bold py-5 rounded-xl shadow-xl hover:bg-gray-800 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black uppercase tracking-widest disabled:opacity-50 disabled:hover:bg-black disabled:cursor-not-allowed" data-purpose="login-button" type="submit" disabled>
          Proceed To Payment
        </button>

<script src="./scripts.js"></script>
</form>
<!-- END: Credentials Form -->
</section>
<!-- END: Form Section -->
</main>
<!-- END: Main Login Container -->


</body></html>
