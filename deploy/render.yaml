services:
  - type: web
    name: project-x
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSLMODE
        value: require
      - key: PAYMENT_CURRENCY
        value: GHS
      - key: EMAIL_ENABLED
        value: false
      - key: DATABASE_URL
        sync: false
      - key: PAYSTACK_SECRET
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYMENT_PAGE_URL
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

